<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAG Blokbar 📺 - Live Scherm</title>
    <link rel="shortcut icon" href="assets/256_schild.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/scherm.css">
</head>

<body>


    <div id="bg-layer">
        <!-- Kept clean matching original DOM expectations, script replaces container safely -->
        <div id="bg-iframe" style="display:none; width: 100vw; height: 100vh; pointer-events: none;"></div>
    </div>
    <div id="bg-overlay"></div>

    <div id="notifs"></div>

    <div id="spin-overlay">
        <canvas id="spin-canvas" width="440" height="440"></canvas>
        <div id="spin-result"></div>
    </div>

    <div id="page-scherm" class="page active">

        <div id="mute-banner">🔇 Stilte gevraagd — respecteer de mute. Vraag eerst vriendelijk als je het geluid wil aanzetten.</div>
        
        <!-- HEADER ELEMENTEN -->
        <div class="scherm-top">
            <div class="header-branding">
                <img src="assets/256_schild.png" class="scherm-logo" alt="Logo">
                <img src="assets/blokbar.svg" class="scherm-blokbar" alt="MAG BLOKBAR">
            </div>
            <div class="scherm-hint">
                Doe mee op: <strong><a id="domain_name" href="./" style="color: inherit; text-decoration: underline;">/</a></strong>
                <div id="qrcode" style="margin-top: 15px;"></div>
            </div>
        </div>

        <!-- MIDDEN VERDEEL LAYOUT -->
        <div class="scherm-middle-layout">
            <div class="scherm-center">
                <div class="scherm-time" id="s-clock">--:--:--</div>
                <div class="scherm-date-str" id="s-date"></div>
                <div class="scherm-quote-wrap">
                    <div class="scherm-quote-text" id="s-quote">...</div>
                    <div class="scherm-quote-by" id="s-quote-by"></div>
                </div>
            </div>

            <!-- ROBUUSTE FLIPCARD SIDEBAR -->
            <div id="s-timers" class="scherm-timers-sidebar"></div>
        </div>

        <div class="scherm-lb">
            <div class="lb-label">Klassement</div>
            <div id="lb-top3" class="lb-top3"></div>
            <div id="lb-rest-grid" class="lb-rest-grid"></div>
        </div>
    </div>

    <script type="module" src="./src/scherm.js"></script>
</body>

</html>
